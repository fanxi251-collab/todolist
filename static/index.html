<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List - 简洁清爽的待办事项管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen">
    <div class="container mx-auto px-4 py-8 max-w-4xl">
        <h1 class="text-3xl font-bold text-center text-gray-800 mb-8">我的待办事项</h1>
        
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            <div class="card card-weather cursor-pointer" onclick="toggleCard('weather')">
                <div class="card-icon">🌤️</div>
                <div class="card-title">天气查询</div>
            </div>
            <div class="card card-notes cursor-pointer" onclick="toggleCard('notes')">
                <div class="card-icon">📝</div>
                <div class="card-title">便签记录</div>
            </div>
            <div class="card card-today cursor-pointer" onclick="toggleCard('today')">
                <div class="card-icon">✅</div>
                <div class="card-title">今日待办</div>
            </div>
            <div class="card card-recycle cursor-pointer" onclick="toggleCard('recycle')">
                <div class="card-icon">🗑️</div>
                <div class="card-title">回收站</div>
            </div>
        </div>

        <div id="weather-panel" class="panel hidden">
            <div class="panel-header">
                <h2 class="text-xl font-semibold">天气查询</h2>
                <button onclick="toggleCard('weather')" class="close-btn">×</button>
            </div>
            <div class="panel-content">
                <div class="flex gap-2 mb-4">
                    <input type="text" id="weather-city" placeholder="请输入城市名称" 
                           class="flex-1 px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400">
                    <button onclick="getWeather()" 
                            class="px-6 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600 transition">
                        查询
                    </button>
                </div>
                <div id="weather-result" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div>
            </div>
        </div>

        <div id="notes-panel" class="panel hidden">
            <div class="panel-header">
                <h2 class="text-xl font-semibold">便签记录</h2>
                <button onclick="toggleCard('notes')" class="close-btn">×</button>
            </div>
            <div class="panel-content">
                <div class="flex gap-2 mb-4 flex-wrap">
                    <input type="text" id="search-notes" placeholder="搜索便签..." 
                           class="flex-1 min-w-[200px] px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400">
                    <button onclick="showCreateNoteModal()" 
                            class="px-6 py-2 bg-green-500 text-white rounded-lg hover:bg-green-600 transition">
                        + 新建便签
                    </button>
                    <button onclick="exportNotes('json')" 
                            class="px-4 py-2 bg-gray-500 text-white rounded-lg hover:bg-gray-600 transition">
                        导出JSON
                    </button>
                </div>
                <div id="notes-list" class="space-y-3"></div>
            </div>
        </div>

        <div id="today-panel" class="panel hidden">
            <div class="panel-header">
                <h2 class="text-xl font-semibold">今日待办</h2>
                <button onclick="toggleCard('today')" class="close-btn">×</button>
            </div>
            <div class="panel-content">
                <div id="today-list" class="space-y-3">
                    <p class="text-gray-500 text-center py-8">暂无今日待办</p>
                </div>
            </div>
        </div>

        <div id="recycle-panel" class="panel hidden">
            <div class="panel-header">
                <h2 class="text-xl font-semibold">回收站</h2>
                <button onclick="toggleCard('recycle')" class="close-btn">×</button>
            </div>
            <div class="panel-content">
                <div class="flex justify-end mb-4">
                    <button onclick="cleanupOldNotes()" 
                            class="px-4 py-2 bg-orange-500 text-white rounded-lg hover:bg-orange-600 transition">
                        清理7天前
                    </button>
                </div>
                <div id="recycle-list" class="space-y-3">
                    <p class="text-gray-500 text-center py-8">回收站是空的</p>
                </div>
            </div>
        </div>
    </div>

    <div id="note-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title" class="text-lg font-semibold">新建便签</h3>
                <button onclick="closeModal()" class="close-btn">×</button>
            </div>
            <div class="modal-body">
                <form id="note-form" enctype="multipart/form-data">
                    <input type="hidden" id="note-id">
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-1">内容</label>
                        <textarea id="note-content" rows="4" 
                                  class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400"
                                  placeholder="请输入便签内容..."></textarea>
                    </div>
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-1">提醒日期</label>
                        <input type="date" id="note-date" 
                               class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400">
                    </div>
                    <div class="mb-4 flex items-center gap-2">
                        <input type="checkbox" id="note-pinned" class="w-4 h-4 text-blue-600">
                        <label for="note-pinned" class="text-sm font-medium text-gray-700">置顶便签</label>
                    </div>
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-1">图片</label>
                        <input type="file" id="note-image" accept="image/*" 
                               class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400">
                        <div id="current-image" class="mt-2 hidden">
                            <img id="preview-image" class="max-w-full h-32 object-cover rounded-lg">
                            <button type="button" onclick="removeImage()" class="text-red-500 text-sm mt-1">移除图片</button>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-1">附件</label>
                        <input type="file" id="note-attachment" 
                               class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400">
                        <div id="current-attachment" class="mt-2 hidden flex items-center gap-2">
                            <span id="attachment-name" class="text-sm text-gray-600"></span>
                            <button type="button" onclick="removeAttachment()" class="text-red-500 text-sm">移除附件</button>
                        </div>
                    </div>
                    <div class="flex justify-end gap-2">
                        <button type="button" onclick="closeModal()" 
                                class="px-4 py-2 border rounded-lg hover:bg-gray-50">取消</button>
                        <button type="submit" 
                                class="px-6 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600 transition">
                            保存
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>



    <script src="/static/js/app.js"></script>
</body>
</html>
